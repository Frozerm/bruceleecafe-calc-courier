<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор ГСМ и ЗП Курьера</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group {
            margin-bottom: 15px;
            flex: 1;
            min-width: 150px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #666;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
            caret-color: #333;
            background-color: #fff;
        }

        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .gsm-rate-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .radio-btn {
            padding: 10px 20px;
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .radio-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .day-card {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 10px;
            background: #fafafa;
            position: relative;
        }

        .btn-add {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-add-small {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.9em;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            -webkit-tap-highlight-color: transparent;
            height: fit-content;
            align-self: center;
        }

        .correction-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #fff;
            box-shadow: var(--shadow);
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        .result-table th, .result-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .result-table th {
            background: var(--primary-color);
            color: white;
        }

        .result-table tr:last-child {
            background: #f9f9f9;
            font-weight: bold;
            font-size: 1.1em;
        }

        .formula-text {
            font-family: 'Courier New', Courier, monospace;
            color: #555;
            font-size: 0.9em;
        }

        .rounded-val {
            color: var(--accent-color);
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #7f8c8d;
            font-size: 0.85em;
            line-height: 1.6;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Расчет курьера</h1>

    <div class="gsm-rate-selector">
        <div id="rate-754" class="radio-btn active" onclick="setGsmRate(7.54)">ГСМ 7.54</div>
        <div id="rate-87" class="radio-btn" onclick="setGsmRate(8.7)">ГСМ 8.7</div>
    </div>

    <!-- Блок ГСМ -->
    <div class="section">
        <div class="section-title">Категория: ГСМ</div>
        <div class="input-group">
            <label>Путь в км</label>
            <input type="number" id="baseDistance" value="124.56" step="0.01" inputmode="decimal" oninput="calculate()">
        </div>
        
        <label class="toggle-group">
            <input type="checkbox" id="hasDelivery" checked onchange="toggleDelivery()"> Был ли развоз?
        </label>

        <div id="deliveryFields" class="row">
            <div class="input-group">
                <label>Путь развоза (км)</label>
                <input type="number" id="deliveryDistance" value="18.16" step="0.01" inputmode="decimal" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Адресов в развозе</label>
                <input type="number" id="addressCount" value="4" inputmode="numeric" pattern="[0-9]*" oninput="calculate()">
            </div>
        </div>
    </div>

    <!-- Блок ЗП -->
    <div class="section">
        <div class="section-title">
            <span>Категория: ЗП</span>
            <label class="toggle-group" style="font-size: 0.7em; margin-bottom: 0;">
                <input type="checkbox" id="hasSalary" checked onchange="toggleSalary()"> Рассчитывать ЗП?
            </label>
        </div>
        
        <div id="salaryContainer">
            <div id="daysList"></div>
            <button class="btn-add" onclick="addDay()">+ Добавить рабочий день</button>
        </div>
    </div>

    <!-- Блок Корректировок -->
    <div class="section">
        <div class="section-title">Корректировки (премии и штрафы)</div>
        <div class="row">
            <!-- Прибавки -->
            <div class="input-group">
                <label class="toggle-group">
                    <input type="checkbox" id="hasBonus" onchange="toggleBonus()"> Прибавка
                </label>
                <div id="bonusContainer" style="display: none;">
                    <div id="bonusList"></div>
                    <button class="btn-add-small" onclick="addBonus()">+ Добавить сумму</button>
                </div>
            </div>
            <!-- Вычитания -->
            <div class="input-group">
                <label class="toggle-group">
                    <input type="checkbox" id="hasPenalty" onchange="togglePenalty()"> Вычитание
                </label>
                <div id="penaltyContainer" style="display: none;">
                    <div id="penaltyList"></div>
                    <button class="btn-add-small" style="background-color:#e67e22;" onclick="addPenalty()">+ Добавить сумму</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица результатов -->
    <table class="result-table" id="resultTable">
        <thead>
            <tr>
                <th>Тип</th>
                <th>Расчет (формула)</th>
                <th>Итог</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            <!-- Сюда вставится расчет -->
        </tbody>
    </table>

    <!-- Футер -->
    <div class="footer">
        Создатель <a href="https://t.me/frozermeow" target="_blank">Frozerm</a><br>
        Сайт создан исключительно для помощи в работе. Никаких коммерческих целей не преследуются.
    </div>
</div>

<script>
    let gsmRate = 7.54;
    let zpDays = [
        { id: 1, hours: 10, minutes: 0, orders: 9 },
        { id: 2, hours: 13, minutes: 30, orders: 11 }
    ];

    let bonuses = [{ id: 1, val: 0 }];
    let penalties = [{ id: 1, val: 0 }];

    const minuteRates = {
        0: 0, 5: 8, 10: 17, 15: 25, 20: 33, 25: 42, 
        30: 50, 35: 58, 40: 67, 45: 75, 50: 83, 55: 92
    };

    function setGsmRate(rate) {
        gsmRate = rate;
        document.getElementById('rate-754').classList.toggle('active', rate === 7.54);
        document.getElementById('rate-87').classList.toggle('active', rate === 8.7);
        calculate();
    }

    function toggleDelivery() {
        document.getElementById('deliveryFields').style.display = document.getElementById('hasDelivery').checked ? 'flex' : 'none';
        calculate();
    }

    function toggleSalary() {
        document.getElementById('salaryContainer').style.display = document.getElementById('hasSalary').checked ? 'block' : 'none';
        calculate();
    }

    function toggleBonus() {
        document.getElementById('bonusContainer').style.display = document.getElementById('hasBonus').checked ? 'block' : 'none';
        calculate();
    }

    function togglePenalty() {
        document.getElementById('penaltyContainer').style.display = document.getElementById('hasPenalty').checked ? 'block' : 'none';
        calculate();
    }

    // ЛОГИКА ДНЕЙ ЗП
    function addDay() {
        const newId = zpDays.length > 0 ? Math.max(...zpDays.map(d => d.id)) + 1 : 1;
        zpDays.push({ id: newId, hours: 0, minutes: 0, orders: 0 });
        renderDays();
        calculate();
    }

    function deleteDay(id) {
        if (zpDays.length > 1) {
            zpDays = zpDays.filter(d => d.id !== id);
            renderDays();
            calculate();
        }
    }

    function updateDayValue(id, field, value) {
        const day = zpDays.find(d => d.id === id);
        if (day) {
            day[field] = parseFloat(value) || 0;
            calculate();
        }
    }

    function renderDays() {
        const list = document.getElementById('daysList');
        list.innerHTML = '';
        
        zpDays.forEach((day, index) => {
            let hoursOptions = '';
            for(let i = 0; i <= 16; i++) {
                hoursOptions += `<option value="${i}" ${day.hours == i ? 'selected' : ''}>${i}</option>`;
            }

            let minutesOptions = '';
            for(let i = 0; i <= 55; i += 5) {
                let displayMin = i < 10 ? '0' + i : i;
                minutesOptions += `<option value="${i}" ${day.minutes == i ? 'selected' : ''}>${displayMin}</option>`;
            }

            const div = document.createElement('div');
            div.className = 'day-card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <strong>День ${index + 1}</strong>
                    ${zpDays.length > 1 ? `<button class="btn-delete" onclick="deleteDay(${day.id})">Удалить</button>` : ''}
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Часы</label>
                        <select onchange="updateDayValue(${day.id}, 'hours', this.value)">
                            ${hoursOptions}
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Минуты</label>
                        <select onchange="updateDayValue(${day.id}, 'minutes', this.value)">
                            ${minutesOptions}
                        </select>
                    </div>
                </div>
                <div class="row" style="margin-top: 10px;">
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Заказы</label>
                        <input type="number" value="${day.orders}" min="0" inputmode="numeric" pattern="[0-9]*" oninput="updateDayValue(${day.id}, 'orders', this.value)">
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // ЛОГИКА НАДБАВОК И ШТРАФОВ
    function addBonus() {
        const newId = bonuses.length > 0 ? Math.max(...bonuses.map(b => b.id)) + 1 : 1;
        bonuses.push({ id: newId, val: 0 });
        renderBonuses();
    }

    function deleteBonus(id) {
        if (bonuses.length > 1) {
            bonuses = bonuses.filter(b => b.id !== id);
            renderBonuses();
            calculate();
        }
    }

    function updateBonus(id, value) {
        const b = bonuses.find(x => x.id === id);
        if (b) {
            b.val = parseFloat(value) || 0;
            calculate();
        }
    }

    function renderBonuses() {
        const list = document.getElementById('bonusList');
        list.innerHTML = '';
        bonuses.forEach(b => {
            const valStr = b.val === 0 ? '' : b.val;
            list.innerHTML += `
                <div class="correction-item">
                    <input type="number" value="${valStr}" placeholder="0" min="0" inputmode="numeric" pattern="[0-9]*" oninput="updateBonus(${b.id}, this.value)">
                    ${bonuses.length > 1 ? `<button class="btn-delete" onclick="deleteBonus(${b.id})">✕</button>` : ''}
                </div>
            `;
        });
    }

    function addPenalty() {
        const newId = penalties.length > 0 ? Math.max(...penalties.map(p => p.id)) + 1 : 1;
        penalties.push({ id: newId, val: 0 });
        renderPenalties();
    }

    function deletePenalty(id) {
        if (penalties.length > 1) {
            penalties = penalties.filter(p => p.id !== id);
            renderPenalties();
            calculate();
        }
    }

    function updatePenalty(id, value) {
        const p = penalties.find(x => x.id === id);
        if (p) {
            p.val = parseFloat(value) || 0;
            calculate();
        }
    }

    function renderPenalties() {
        const list = document.getElementById('penaltyList');
        list.innerHTML = '';
        penalties.forEach(p => {
            const valStr = p.val === 0 ? '' : p.val;
            list.innerHTML += `
                <div class="correction-item">
                    <input type="number" value="${valStr}" placeholder="0" min="0" inputmode="numeric" pattern="[0-9]*" oninput="updatePenalty(${p.id}, this.value)">
                    ${penalties.length > 1 ? `<button class="btn-delete" onclick="deletePenalty(${p.id})">✕</button>` : ''}
                </div>
            `;
        });
    }

    function formatTime(h, m) {
        return `${h}:${m < 10 ? '0' + m : m}`;
    }

    function calculate() {
        const baseDist = parseFloat(document.getElementById('baseDistance').value) || 0;
        const hasDelivery = document.getElementById('hasDelivery').checked;
        const delDist = hasDelivery ? (parseFloat(document.getElementById('deliveryDistance').value) || 0) : 0;
        const addrCount = hasDelivery ? (parseInt(document.getElementById('addressCount').value) || 0) : 0;
        const hasSalary = document.getElementById('hasSalary').checked;
        const hasBonus = document.getElementById('hasBonus').checked;
        const hasPenalty = document.getElementById('hasPenalty').checked;

        // ГСМ
        const gsmRaw = (baseDist + delDist) * gsmRate;
        const gsmRounded = Math.round(gsmRaw);
        const gsmFormula = hasDelivery ? 
            `(${baseDist.toString().replace('.', ',')} + ${delDist.toString().replace('.', ',')}) * ${gsmRate.toString().replace('.', ',')} = ${gsmRaw.toFixed(1).replace('.', ',')}` :
            `${baseDist.toString().replace('.', ',')} * ${gsmRate.toString().replace('.', ',')} = ${gsmRaw.toFixed(1).replace('.', ',')}`;

        // ЗП
        let zpRaw = 0;
        let zpRounded = 0;
        let zpFormula = "";
        
        if (hasSalary) {
            let totalHoursForPay = 0;
            let totalMinutesForPay = 0;
            let totalOrders = 0;
            let timeParts = [];
            let orderParts = [];

            zpDays.forEach(d => {
                totalHoursForPay += parseInt(d.hours);
                totalMinutesForPay += parseInt(d.minutes);
                totalOrders += parseInt(d.orders);
                timeParts.push(formatTime(d.hours, d.minutes));
                orderParts.push(d.orders);
            });

            totalHoursForPay += Math.floor(totalMinutesForPay / 60);
            totalMinutesForPay = totalMinutesForPay % 60;

            const minutesMoney = minuteRates[totalMinutesForPay] || 0;
            const timeMoney = (totalHoursForPay * 100) + minutesMoney;
            const orderMoney = totalOrders * 120;

            zpRaw = timeMoney + orderMoney;
            zpRounded = Math.round(zpRaw);
            
            const timeStr = timeParts.length > 1 ? `(${timeParts.join(' + ')})` : timeParts[0];
            const orderStr = orderParts.length > 1 ? `(${orderParts.join(' + ')})` : orderParts[0];
            
            zpFormula = `(${timeStr} * 100) + (${orderStr} * 120) = ${zpRaw.toFixed(0)}`;
        }

        // Подсчет корректировок
        let bonusTotal = 0;
        let bonusArr = [];
        if (hasBonus) {
            bonuses.forEach(b => {
                if (b.val > 0) {
                    bonusTotal += b.val;
                    bonusArr.push(b.val);
                }
            });
        }

        let penaltyTotal = 0;
        let penaltyArr = [];
        if (hasPenalty) {
            penalties.forEach(p => {
                if (p.val > 0) {
                    penaltyTotal += p.val;
                    penaltyArr.push(p.val);
                }
            });
        }

        // РКО
        const addrMoney = addrCount * 120;
        const baseRko = gsmRounded + zpRounded + addrMoney;
        const finalRko = baseRko + bonusTotal - penaltyTotal;
        
        let rkoFormula = `${gsmRounded}`;
        if (hasSalary) {
            rkoFormula += ` + ${zpRounded}`;
        }
        if (hasDelivery) {
            rkoFormula += ` + (${addrCount} * 120)`;
        }

        if (bonusArr.length > 0 || penaltyArr.length > 0) {
            rkoFormula += ` = ${baseRko}`;
            bonusArr.forEach(b => rkoFormula += ` + ${b}`);
            penaltyArr.forEach(p => rkoFormula += ` - ${p}`);
        }

        rkoFormula += ` = ${finalRko}`;

        // Таблица
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = `
            <tr>
                <td>ГСМ</td>
                <td class="formula-text">${gsmFormula}</td>
                <td class="rounded-val">${gsmRounded}</td>
            </tr>
        `;

        if (hasSalary) {
            tbody.innerHTML += `
                <tr>
                    <td>ЗП</td>
                    <td class="formula-text">${zpFormula}</td>
                    <td class="rounded-val">${zpRounded}</td>
                </tr>
            `;
        }

        tbody.innerHTML += `
            <tr>
                <td>ИТОГО в РКО</td>
                <td class="formula-text">${rkoFormula}</td>
                <td class="rounded-val">${finalRko}</td>
            </tr>
        `;
    }

    // Инициализация
    renderDays();
    renderBonuses();
    renderPenalties();
    calculate();

    let touchStartY = 0;
    document.addEventListener('touchstart', function(e) {
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        let touchEndY = e.touches[0].clientY;
        if (touchEndY - touchStartY > 20) {
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.blur();
            }
        }
    }, { passive: true });
</script>

</body>
</html>
